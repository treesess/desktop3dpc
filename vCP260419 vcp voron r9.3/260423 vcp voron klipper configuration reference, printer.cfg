# Driver4 by official, i use the last one. 

# Driver7
# [extruder]
#step_pin: PE6
#dir_pin: PA14
#enable_pin: !PE0
#heater_pin: PB11 # HE3
#sensor_pin: PF7 # T3
#...

#[filament_switch_sensor material_3]
#switch_pin: PG15

[extruder]                          # 挤出机
step_pin: PE6                      # 挤出电机方脉冲引脚
dir_pin: !PA14                       # 挤出电机方向引脚设置
enable_pin: !PE0                    # 挤出电机方使能引脚设置

rotation_distance: 60 ; start with 20, the larger, the slower
full_steps_per_rotation: 200 ; 1.8° stepper
microsteps: 1     ; use full stop                  
nozzle_diameter: 9999        ; to avoide max. extrusion error      
filament_diameter: 9999             # 耗材直径


heater_pin: PB11    #   PB11                     # 加热棒引脚
sensor_pin: PF4       #PF7                     # 传感器引脚,连接到 ADC_0   
sensor_type: ATC Semitec 104GT-2    # 传感器型号  (Generic 3950, ATC Semitec 104GT-2， PT1000)
min_temp: -170                       
max_temp: 170                      
max_power: 0.3                    
min_extrude_temp: -100              
pressure_advance: 0.0  
max_extrude_only_distance: 999999   # 挤出流量报错可以注释这个，但是建议重新切片
#喷嘴温度PID校准命令：  "PID_CALIBRATE HEATER=extruder TARGET=100
control = pid                # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
pid_kp = 26.213              # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
pid_ki = 1.304               # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
pid_kd = 131.721             # PID喷嘴温度自动校准项（pid校准完成后，会被注释）
# step_pulse_duration: 0.000004
#容差50℃
[verify_heater extruder]
max_error: 200
check_gain_time: 20
hysteresis: 20
heating_gain: 2

