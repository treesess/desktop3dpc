[tmc2209 stepper_x]                 # X 驱动配置 -TMC2209
uart_pin: PC4                      # 通讯端口Pin脚定义
interpolate: False                  # 是否开启256微步插值（开启是True，关闭是 False）
run_current: 0.6                    # 电机运行电流值（单位：mA）
sense_resistor: 0.110               # 驱动采样电阻不要改
