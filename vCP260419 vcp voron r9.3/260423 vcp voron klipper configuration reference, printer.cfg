[include fluidd.cfg]



# [temperature_sensor FLY-Pi]
# sensor_type: temperature_host

# ========================================================
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_200033001750344D30353320-if00
# CAN bus is also available on this board

[printer]
kinematics: corexy
max_velocity: 300               # 打印机最大速度   
max_accel: 3000                 # 最大加速度 最大3000
max_z_velocity: 40              # z轴最大速度
max_z_accel: 100                # z轴最大加速度
square_corner_velocity: 3.0     # 方形拐角速度，小一点可以有效避免平台重带来的惯性






[idle_timeout]
timeout: 72000    # 3600 = 1 hour 


[force_move]
enable_force_move: True


[gcode_macro FAKE_POSITION]
gcode:
        SET_KINEMATIC_POSITION X=150 Y=0 Z=0
        SET_GCODE_OFFSET Z_ADJUST=10 MOVE=1
        G0 Z10
        G0 Z0
        
[gcode_macro Z_up]
gcode:
        G0 Z10



#--------------------------------------------------------------------
[gcode_macro PRINT_START]          # 将 PRINT_START 设置为开始打印时的宏，自定义打印前的动作


gcode:
    G92 E0                         # 重置挤出
    BED_MESH_CLEAR                 # 卸载网床
    SET_FAN_SPEED FAN=fan1 SPEED=1
    SET_FAN_SPEED FAN=fan2 SPEED=1
    SET_FAN_SPEED FAN=fan3 SPEED=1
    SET_FAN_SPEED FAN=fan5 SPEED=1
    SET_FAN_SPEED FAN=fan4 SPEED=0.12 ; toolhead LED
   ; G28                             # 归位所有轴
  ;  quad_gantry_level              # 龙门架调平
   ; G28                            # 归位所有轴
  ;  G1 Z20 F3000                   # 将喷嘴移离热床
  ;  BED_MESH_PROFILE LOAD=default  # 加载网床
#--------------------------------------------------------------------


#--------------------------------------------------------------------
[gcode_macro PRINT_END]            # 将 PRINT_END 设置为打印结束时的宏，自定义打印完成之后动作


gcode:
    M400                             # 等待缓冲区清除
    G92 E0                           # 将挤出机归零
 ;   G1 E-1.0 F3600                   # 缩回耗材丝
    G91                              # 相对定位
  ;  G0 Z1.00 X20.0 Y20.0 F20000      # 移动喷嘴以移除架线
   ; TURN_OFF_HEATERS                 # 关闭热端
    ; M107                             # 关闭风扇
    G1 Z2 F6000                      # 将喷嘴向上移动2毫米
    G1 Z10 F3000                      # 
   ; G1 Z50 F3000                      # 
    
    G90                              # 绝对定位
    G0  X150 Y20 F3600              # 
    BED_MESH_CLEAR                   # 卸载网床




[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    ##### set defaults #####
    {% set x = params.X|default(5) %}      #edit to your park position
    {% set y = params.Y|default(5) %}      #edit to your park position
    {% set z = params.Z|default(10)|float %} #edit to your park position
    {% set e = params.E|default(1) %}        #edit to your retract length
    ##### calculate save lift position #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% set lift_z = z|abs %}
    {% if act_z < (max_z - lift_z) %}
        {% set z_safe = lift_z %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    ##### end of definitions #####
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    ; G1 E-{e} F2100
    G1 Z{z_safe}
    G90
    ;G1 X{x} Y{y} F6000
    G1 X250 Y20 F6000






# --------------------------
# T1电机的独立配置   260408 雙擠出機配置 # Driver4
# --------------------------
[extruder_stepper extruder_t1]
# 初始不绑定，开机不激活

extruder:
# T1电机的独立参数（完全自定义）
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 4.69
;gear_ratio: 50:17

# T1电机驱动配置
[tmc2209 extruder_stepper extruder_t1]
uart_pin: PF2
run_current: 0.6
interpolate: false

# --------------------------
# 换刀切换宏
# --------------------------
# 激活T0电机
[gcode_macro T0]
gcode:
    # 解绑T1电机
    SYNC_STEPPER_TO_EXTRUDER STEPPER=extruder_t1 EXTRUDER=
    # 激活T0电机绑定到主挤出机
    SYNC_STEPPER_TO_EXTRUDER STEPPER=extruder EXTRUDER=extruder
    M117 Activated T0

# 激活T1电机
[gcode_macro T1]
gcode:
    # 解绑T0电机
    SYNC_STEPPER_TO_EXTRUDER STEPPER=extruder EXTRUDER=
    # 激活T1电机绑定到主挤出机
    SYNC_STEPPER_TO_EXTRUDER STEPPER=extruder_t1 EXTRUDER=extruder
    M117 Activated T1


















# This file contains common pin mappings for the BigTreeTech Octopus
# and Octopus Pro boards. To use this config, start by identifying the
# micro-controller on the board - it may be an STM32F446, STM32F429,
# or an STM32H723.  Select the appropriate micro-controller in "make
# menuconfig" and select "Enable low-level configuration options". For
# STM32F446 boards the firmware should be compiled with a "32KiB
# bootloader" and a "12MHz crystal" clock reference. For STM32F429
# boards use a "32KiB bootloader" and an "8MHz crystal". For STM32H723
# boards use a "128KiB bootloader" and a "25Mhz crystal".

# See docs/Config_Reference.md for a description of parameters.


#####################################################################
#             X/Y步进电机设置 (X/Y Stepper Settings)                 # 
#####################################################################
#   B Motor ---- Motor A 
#   |                  |
#   |------挤出机-------|
#   |                  |
#   |                  |
#          正前方   






#####################################################################
#                          X 轴步进电机   (B 电机)                    #
#####################################################################


# Driver0
[stepper_x]
step_pin: PF13                       # X轴电机脉冲引脚设置
dir_pin: PF12                        # X轴电机运行引脚设置,方向按实际判断，加感叹号会让运行方向反转
enable_pin: !PF14                    # X轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作
rotation_distance: 40               # 主动带轮周长mm（2GT-20T带轮40，2GT-16T带轮32）
microsteps: 8                      # 电机细分设置，细分越高，质量越高，但主控负荷越大
full_steps_per_rotation: 200        # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400）
endstop_pin: PG6                   # 限位开关PIN脚,建议常闭然后添加！反转状态,位置在io-3
###接常闭后是触发状态，加感叹号可以反转这个状态，万一断线时候可以避免撞机
position_min: 0                     # 软限位最小行程
position_endstop: 300               # 软限位最大行程 (250mm-300mm-350mm)
position_max: 300                   # 机械限位最大行程 (250mm-300mm-350mm)
homing_speed: 80                    # 复位速度，最大为100.归位速度建议别太快
homing_retract_dist: 5              # 第一次触发复位开关之后的后退距离
homing_positive_dir: true           # 复位方向（一般不需要改动）
# step_pulse_duration: 0.000004



#####################################################################
#                       y 轴步进电机   (A 电机)                       #
###################################y##################################
#Y电机口
# Driver1
[stepper_y]
step_pin: PG0                       # Y轴电机脉冲引脚设置
dir_pin: PG1                      # Y轴电机运行引脚设置,方向按实际判断，加感叹号会让运行方向反转
enable_pin: !PF15                   # Y轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作
rotation_distance: 40               # 主动带轮周长mm（2GT-20T带轮40，2GT-16T带轮32）
microsteps: 8                      # 电机细分设置，细分越高，质量越高，但主控负荷越大
full_steps_per_rotation: 200        # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400）
endstop_pin: PG9                   # 限位开关PIN脚,建议常闭然后添加！反转状态,位置在io-0
###接常闭后是触发状态，加感叹号可以反转这个状态，万一断线时候可以避免撞机
position_min: 0                     # 软限位最小行程
position_endstop: 300               # 软限位最大行程 (250mm-300mm-350mm)
position_max: 300                   # 机械限位最大行程 (250mm-300mm-350mm)
homing_speed: 80                    # 复位速度，最大为100        归位速度建议别太快
homing_retract_dist: 5              # 第一次触发复位开关之后的后退距离
homing_positive_dir: true           # 复位方向（一般不需要改动）
# step_pulse_duration: 0.000004


#####################################################################
#                     Z轴步进电机 （Z Stepper Settings）              #
#####################################################################
#  Z1-------------Z2
#   |              |
#   |              |
#   |              |
#  Z0----显示屏----Z3

#####################################################################
#                           Z轴步进电机                              #
#####################################################################



# Driver2
##  Z步进电机 - 左前方 z接口
[stepper_z]
step_pin: PF11                 # z轴电机脉冲引脚设置
dir_pin: PG3                 # z轴电机方向引脚设置,方向引脚需要按实际判断，加感叹号会让运行方向反转
enable_pin: !PG5              # z轴电机方向引脚设置,方向引脚需要按实际判断，加感叹号会让运行方向反转
rotation_distance: 40         # 主动轮周长mm （2GT-20T为 40mm  16T为 32mm）
gear_ratio: 80:16             # 减速比
full_steps_per_rotation: 200  # 电机单圈所需脉冲数（1.8度电机:200，0.9度电机:400
microsteps: 8                # 电机细分设置,细分越高，质量越高，但主控负荷越大
endstop_pin: !PG10             # 限位开关PIN脚,建议常闭然后添加！反转状态,位置在io-1
# endstop_pin: probe:z_virtual_endstop # for tap
position_endstop: -5
## position_endstop 是喷嘴相对于打印表面(Z0)到Z限位停止触发点的位置(单位:mm)
## 正数值 = 高于平台的终止点，负数值 = 低于平台的的终止点
## 增加position_endstop的数值会使喷嘴更靠近床
## 在运行Z_ENDSTOP_CALIBRATE之后，position_endstop将存储在CFG配置的最后
position_min: -10             # （配置喷嘴清洁需要-5左右）
position_max: 300             # 机械限位最大行程 (250mm-300mm-350mm)
homing_speed: 10               # 复位速度-最大 20
second_homing_speed: 3        # 二次复位速度-最大 10
homing_retract_dist: 5        # 后撤距离
# step_pulse_duration: 0.000004




# Driver3
##  Z1 步进电机 - 后方E0接口
[stepper_z1]
#step_pin: PG4                 # z1轴电机脉冲引脚设置
#dir_pin: !PC1                 # z1轴电机方向引脚设置,方向引脚需要按实际判断，加感叹号会让运行方向反转
#enable_pin: !PA2              # z1轴电机使能引脚设置,使能引脚需要加感叹号，否者电机不工作

