[tmc2209 extruder]                  # 挤出机驱动配置- TMC2209
uart_pin: PD3                      # 通讯端口Pin脚定义
interpolate: False                  # should be False
run_current: 0.8                   # 
hold_current: 0.8 # matching run_current is good
# sense_resistor: 0.110               # 驱动采样电阻不要改
stealthchop_threshold: 0          # should be 0
; coolstep: False  # should be False
; stallguard_threshold: 0 # should be False
; blank_time: 24 ; can further up to 28
; hysteresis: 2   ; can further up to 3
driver_SGTHRS: 0         # 关闭StallGuard堵转检测（撞击场景必须）


